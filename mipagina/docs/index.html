<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompetitiveSA | Leaderboard</title>
    <meta name="description" content="CompetitiveSA - competitive players and crews leaderboard">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0d1117;
    color:white;
    display:flex;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#111827;
    border-right:1px solid #232b3b;
    padding:25px;
    position:fixed;
}

.sidebar h2{
    color:#4f8cff;
    margin-bottom:30px;
}

.menu-toggle{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    color:#d4d4d4;
    padding:8px 0 14px 0;
    font-size:16px;
    cursor:pointer;
}

/* Collapsed sidebar: keep icons, hide labels and reduce width */
.sidebar.collapsed{
    width:80px;
}

.sidebar.collapsed h2{
    display:none;
}

.sidebar.collapsed nav a{
    text-align:center;
    padding:10px 6px;
}

.sidebar.collapsed nav a .label{
    display:none;
}

.sidebar nav{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.sidebar a{
    color:#d4d4d4;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
    transition:.25s;
}

.sidebar a:hover{
    background:#1f2937;
    color:white;
}

.content{
    margin-left:270px;
    width:100%;
    padding:40px;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

header input{
    width:280px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    outline:none;
}

.player-card{
    background:#161b22;
    border:1px solid #2d3748;
    border-radius:18px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.25s;
}

.player-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 25px rgba(0,140,255,.2);
}

.left{
    display:flex;
    align-items:center;
    gap:20px;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#3b82f6;
}

.buttons{
    display:flex;
    gap:12px;
}

button{
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
    font-weight:600;
}

.youtube{
    background:#ff3131;
}

.discord{
    background:#5865F2;
}

/* Make anchor links inside .buttons look like buttons */
.buttons a{
    text-decoration:none;
    color:white;
    padding:12px 20px;
    border-radius:25px;
    display:inline-block;
    font-weight:600;
}

.buttons a.discord{
    background:#5865F2;
}

/* Avatar image styling */
.avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* Player detail panel */
#player-detail{
    margin-bottom:18px;
}

.player-detail-card{
    background:linear-gradient(180deg,#0b0f13,#0e161a);
    border:1px solid rgba(255,255,255,0.03);
    padding:20px;
    border-radius:18px;
    color:#cfe7ff;
    max-width:520px;
    margin:0 auto 18px auto;
    position:relative;
}

.player-detail-card .close-x{
    position:absolute;
    right:12px;
    top:12px;
    background:transparent;
    border:none;
    color:#9fb6d8;
    font-size:18px;
    cursor:pointer;
}

.player-detail-card .avatar-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:12px;
}

.player-detail-card .avatar-large{
    width:92px;
    height:92px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(79,140,255,0.12);
    box-shadow:0 6px 20px rgba(0,0,0,0.6);
}

.player-detail-card h3{
    text-align:center;
    color:#79b7ff;
    letter-spacing:2px;
    margin:6px 0 8px 0;
}

.badge{
    display:inline-block;
    background:#6b1f2a;
    color:#ffdede;
    padding:6px 12px;
    border-radius:16px;
    font-size:13px;
    margin:0 auto 10px auto;
    display:block;
    width:max-content;
}

.player-detail-card p.region{
    text-align:center;
    color:#cfe7ff;
    margin-bottom:14px;
}

.position-box{
    background:#071017;
    border:1px solid rgba(255,255,255,0.02);
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
}

.stats-box{
    background:#061016;
    border-radius:10px;
    padding:12px;
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
}

.stat-item{
    background:rgba(255,255,255,0.03);
    padding:8px 12px;
    border-radius:8px;
    text-align:center;
}

.social-btn{
    background:#00a9ff;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    display:block;
    text-align:center;
    text-decoration:none;
    font-weight:600;
}

/* War logs list */
.war-log{
    background:#0f1418;
    border:1px solid #26303a;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.war-log small{
    color:#9aa6b2;
}

.talents{
    background:#f5b400;
    color:black;
}
</style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <h2><a href="http://competitivesa.com" id="brand-link">competitivesa.com</a></h2>
        <button id="menu-toggle" class="menu-toggle">Menu</button>

        <nav>
            <a href="#" id="link-players">🏆 <span class="label">Players</span></a>
            <a href="#" id="link-crews">👥 <span class="label">Crews</span></a>
            <a href="#" id="link-warlogs">🗡️ <span class="label">War Logs</span> ⚔️</a>
            <a href="#">📜 <span class="label">Rules</span></a>
        </nav>
    </aside>

    <main class="content">

        <header>
            <h1>Top Players</h1>
            <input id="search-input" type="text" placeholder="Buscar jugador...">
        </header>

        <div id="player-detail"></div>
        <div id="players"></div>

    </main>

    <script>
// Maneja generación dinámica de jugadores y crews
function generatePlayers(count) {
  const container = document.getElementById('players');
  if (!container) return;
  container.innerHTML = '';
  window.currentView = 'players';
  for (let i = 1; i <= count; i++) {
    const card = document.createElement('div');
    card.className = 'player-card';
    const name = (i === 1) ? 'Astarum' : `Jugador ${i}`;
    const astarumDiscordId = '1056681722353303614';
    const astarumAvatar = 'file:///C:/Users/Diegoo/Downloads/1f05e6cb522cc355812f8f7c4685ea01.jpg';
    const discordElement = (i === 1)
      ? `<a class="discord" href="https://discord.com/users/${astarumDiscordId}" target="_blank" rel="noopener noreferrer">Discord</a>`
      : `<button class="discord">Discord</button>`;

    const youtubeElement = (i === 1)
      ? `<a class="youtube" href="https://www.youtube.com/@astarumking" target="_blank" rel="noopener noreferrer">YouTube</a>`
      : `<button class="youtube">YouTube</button>`;

    const regionList = ['NA','EU','ASIA','SA','OC'];
    const region = (i === 1) ? 'EU' : regionList[i % regionList.length];

    const avatarHtml = (i === 1)
      ? `<div class="avatar"><img src="${astarumAvatar}" alt="Astarum avatar"></div>`
      : `<div class="avatar"></div>`;

    card.innerHTML = `
      <div class="left">
        ${avatarHtml}
        <div>
          <h2>${name}</h2>
          <p>#${i} Global</p>
        </div>
      </div>
      <div class="buttons">
        ${youtubeElement}
        ${discordElement}
      </div>
    `;
    container.appendChild(card);
  }
}

function showPlayerDetail(playerName) {
  const detail = document.getElementById('player-detail');
  const headerEl = document.querySelector('main .content header h1');
  if (!detail) return;
  let region = 'Unknown';
  if (playerName.toLowerCase() === 'astarum') region = 'EU';
  else {
    const m = playerName.match(/Jugador\s*(\d+)/i);
    if (m) {
      const idx = parseInt(m[1], 10);
      const regions = ['NA','EU','ASIA','SA','OC'];
      region = regions[idx % regions.length];
    }
  }

  detail.innerHTML = `
    <div class="player-detail-card">
      <button class="close-x" id="detail-close">✕</button>
      <div class="avatar-wrap">
        <div class="avatar-large">
          ${playerName.toLowerCase() === 'astarum' ? `<img src="file:///C:/Users/Diegoo/Downloads/1f05e6cb522cc355812f8f7c4685ea01.jpg" alt="${playerName}">` : '<div style="width:100%;height:100%;background:#223;"></div>'}
        </div>
      </div>
      <h3>${playerName}</h3>
      <span class="badge">Elite Master</span>
      <p class="region">Region: <strong>${region}</strong></p>

      <div class="position-box">
        <strong>1. <span style="color:#ffd54a">LEADERBOARD</span></strong>
        <span style="float:right;color:#9aa6b2">(180 points)</span>
      </div>

      <div class="stats-box">
        <div class="stat-item">LT1<br><small>(90 Pts)</small></div>
        <div class="stat-item">LT1<br><small>(90 Pts)</small></div>
      </div>

      <a class="social-btn" href="https://discord.com/users/1056681722353303614" target="_blank" rel="noopener noreferrer">Discord Profile</a>
    </div>
  `;

  const closeBtn = document.getElementById('detail-close');
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      detail.innerHTML = '';
      if (window.currentView === 'players') generatePlayers(50);
      else if (window.currentView === 'crews') generateCrews(10);
      else if (window.currentView === 'warlogs') generateWarLogs(5);
    });
  }
}

function generateWarLogs(count) {
  const container = document.getElementById('players');
  if (!container) return;
  window.currentView = 'warlogs';
  container.innerHTML = '';
  const headerEl = document.querySelector('main .content header h1');
  if (headerEl) headerEl.textContent = 'War Logs';

  for (let i = 1; i <= count; i++) {
    const log = document.createElement('div');
    log.className = 'war-log';
    log.innerHTML = `
      <strong>War #${i}</strong>
      <p>Winner: Crew ${i} — Loser: Crew ${i+1}</p>
      <small>Fecha: 2026-07-${(10+i).toString().padStart(2,'0')}</small>
    `;
    container.appendChild(log);
  }
}

function generateCrews(count) {
  const container = document.getElementById('players');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 1; i <= count; i++) {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.innerHTML = `
      <div class="left">
        <div class="avatar"></div>
        <div>
          <h2>Crew ${i}</h2>
          <p>#${i} Crew</p>
        </div>
      </div>
      <div class="buttons">
        <button class="youtube">Ver</button>
      </div>
    `;
    container.appendChild(card);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const headerEl = document.querySelector('main .content header h1');
  if (headerEl) headerEl.textContent = 'Top Players';
  generatePlayers(50);

  const linkCrews = document.getElementById('link-crews');
  const linkPlayers = document.getElementById('link-players');
  const menuToggle = document.getElementById('menu-toggle');
  const sidebar = document.querySelector('.sidebar');

  if (menuToggle && sidebar) {
    menuToggle.addEventListener('click', (e) => {
      e.preventDefault();
      sidebar.classList.toggle('collapsed');
    });
  }

  if (linkCrews) {
    linkCrews.addEventListener('click', (e) => {
      e.preventDefault();
      if (headerEl) headerEl.textContent = 'Top Crews';
      generateCrews(10);
    });
  }

  const linkWarlogs = document.getElementById('link-warlogs');
  if (linkWarlogs) {
    linkWarlogs.addEventListener('click', (e) => {
      e.preventDefault();
      generateWarLogs(5);
    });
  }

  if (linkPlayers) {
    linkPlayers.addEventListener('click', (e) => {
      e.preventDefault();
      if (headerEl) headerEl.textContent = 'Top Players';
      generatePlayers(50);
    });
  }

  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        const q = searchInput.value.trim();
        if (!q) return;
        showPlayerDetail(q);
      }
    });
  }
});
</script>

</body>
</html>
